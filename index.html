<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>다모아건축</title>
    <style>
        body {
            font-family: 'Malgun Gothic', sans-serif;
            max-width: 800px;
            margin: 50px auto;
            padding: 20px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }
        h1 {
            font-size: 3em;
            text-align: center;
        }
        .container {
            background: rgba(255,255,255,0.1);
            padding: 30px;
            border-radius: 10px;
            backdrop-filter: blur(10px);
        }
        p {
            font-size: 1.2em;
            line-height: 1.8;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🏗️ 다모아건축</h1>
        <p>안녕하세요! 다모아건축입니다.</p>
        <p>최고의 건축 서비스를 제공합니다.</p>
        <p>📞 문의: 항상 환영합니다!</p>
    </div>
</body>
</html>
